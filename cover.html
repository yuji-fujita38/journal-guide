<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ジャーナル完全攻略ガイド — 表紙</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #07071a;
    }

    body {
      font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* A4 cover container */
    .cover {
      width: 794px;
      height: 1123px;
      background: #07071a;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── 背景装飾 ── */
    .bg-glow-top {
      position: absolute;
      top: -160px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse at center, rgba(120,40,220,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .bg-glow-bottom {
      position: absolute;
      bottom: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse at center, rgba(100,30,200,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* 外枠ボーダー */
    .border-frame {
      position: absolute;
      inset: 28px;
      border: 1px solid rgba(147, 51, 234, 0.28);
      border-radius: 4px;
      pointer-events: none;
    }

    .border-frame-inner {
      position: absolute;
      inset: 34px;
      border: 1px solid rgba(147, 51, 234, 0.10);
      border-radius: 2px;
      pointer-events: none;
    }

    /* コーナー装飾 */
    .corner {
      position: absolute;
      width: 24px;
      height: 24px;
    }

    .corner::before,
    .corner::after {
      content: '';
      position: absolute;
      background: #9333ea;
    }

    .corner::before { width: 2px; height: 18px; }
    .corner::after  { width: 18px; height: 2px; }

    .corner--tl { top: 24px; left: 24px; }
    .corner--tr { top: 24px; right: 24px; transform: scaleX(-1); }
    .corner--bl { bottom: 24px; left: 24px; transform: scaleY(-1); }
    .corner--br { bottom: 24px; right: 24px; transform: scale(-1); }

    .corner--tl::before { top: 0; left: 0; }
    .corner--tl::after  { top: 0; left: 0; }

    /* ── ルーンライン（水平装飾ライン）── */
    .rune-line {
      width: 420px;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(147,51,234,0.6) 30%, rgba(192,132,252,0.8) 50%, rgba(147,51,234,0.6) 70%, transparent 100%);
      margin: 0 auto;
    }

    .rune-line--thin {
      width: 280px;
      background: linear-gradient(90deg, transparent 0%, rgba(147,51,234,0.35) 30%, rgba(192,132,252,0.5) 50%, rgba(147,51,234,0.35) 70%, transparent 100%);
    }

    /* ── コンテンツ ── */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 0 80px;
      gap: 0;
    }

    /* タグライン（上部） */
    .tag-top {
      font-size: 11px;
      letter-spacing: 5px;
      color: #7c3aed;
      text-transform: uppercase;
      font-weight: 400;
      margin-bottom: 28px;
    }

    /* イラスト */
    .illustration {
      margin-bottom: 32px;
      filter: drop-shadow(0 0 32px rgba(147,51,234,0.35)) drop-shadow(0 0 64px rgba(120,40,220,0.20));
    }

    /* メインタイトル */
    .main-title {
      font-size: 46px;
      font-weight: 900;
      letter-spacing: 6px;
      text-align: center;
      line-height: 1.25;
      background: linear-gradient(130deg, #d8b4fe 0%, #f0abfc 40%, #ffffff 80%, #d8b4fe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 20px 0 10px;
    }

    /* サブタイトル */
    .sub-title {
      font-size: 13px;
      color: #6040a0;
      letter-spacing: 3px;
      font-weight: 400;
      margin-bottom: 32px;
      text-align: center;
    }

    /* ベネフィット文 */
    .benefit-block {
      margin: 30px 0 28px;
      padding: 22px 36px;
      background: linear-gradient(135deg, rgba(120,50,240,0.14) 0%, rgba(80,20,160,0.08) 100%);
      border: 1px solid rgba(147,51,234,0.30);
      border-radius: 3px;
      text-align: center;
      position: relative;
    }

    .benefit-block::before {
      content: '';
      position: absolute;
      inset: 3px;
      border: 1px solid rgba(147,51,234,0.10);
      border-radius: 1px;
      pointer-events: none;
    }

    .benefit-text {
      font-size: 18px;
      font-weight: 700;
      color: #fde68a;
      letter-spacing: 2px;
      line-height: 1.7;
    }

    .benefit-text span {
      color: #f0abfc;
    }

    /* 対象者ラベル */
    .target-label {
      font-size: 11.5px;
      color: #7060a0;
      letter-spacing: 2px;
      margin-top: 26px;
      font-weight: 400;
    }

    /* 点々パーティクル（装飾） */
    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .dot {
      position: absolute;
      border-radius: 50%;
      background: rgba(192, 132, 252, 0.5);
    }

    /* 横ライン装飾 (STAGEヘッダー風) */
    .stage-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 10px;
      letter-spacing: 5px;
      color: #9333ea;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .stage-badge::before,
    .stage-badge::after {
      content: '';
      display: block;
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #9333ea);
    }

    .stage-badge::after {
      background: linear-gradient(90deg, #9333ea, transparent);
    }
  </style>
</head>
<body>
  <div class="cover">

    <!-- 背景グロー -->
    <div class="bg-glow-top"></div>
    <div class="bg-glow-bottom"></div>

    <!-- フレーム -->
    <div class="border-frame"></div>
    <div class="border-frame-inner"></div>

    <!-- コーナー装飾 -->
    <div class="corner corner--tl"></div>
    <div class="corner corner--tr"></div>
    <div class="corner corner--bl"></div>
    <div class="corner corner--br"></div>

    <!-- パーティクル -->
    <div class="particles">
      <div class="dot" style="width:2px;height:2px;top:12%;left:15%;opacity:0.5;"></div>
      <div class="dot" style="width:3px;height:3px;top:20%;left:82%;opacity:0.4;"></div>
      <div class="dot" style="width:2px;height:2px;top:35%;left:9%;opacity:0.3;"></div>
      <div class="dot" style="width:2px;height:2px;top:72%;left:88%;opacity:0.45;"></div>
      <div class="dot" style="width:1px;height:1px;top:60%;left:12%;opacity:0.5;"></div>
      <div class="dot" style="width:3px;height:3px;top:80%;left:22%;opacity:0.25;"></div>
      <div class="dot" style="width:2px;height:2px;top:88%;left:75%;opacity:0.35;"></div>
      <div class="dot" style="width:1px;height:1px;top:45%;left:91%;opacity:0.4;"></div>
    </div>

    <!-- メインコンテンツ -->
    <div class="content">

      <!-- ステージバッジ -->
      <div class="stage-badge">SPECIAL BONUS GUIDE</div>

      <!-- 上部ルーンライン -->
      <div class="rune-line"></div>

      <!-- イラスト（ノートとペン） -->
      <div class="illustration" style="margin-top: 36px;">
        <svg width="380" height="230" viewBox="0 0 380 230" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <!-- フィルター -->
            <filter id="glow-book" x="-15%" y="-15%" width="130%" height="130%">
              <feGaussianBlur stdDeviation="5" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="nib-glow" x="-120%" y="-120%" width="440%" height="440%">
              <feGaussianBlur stdDeviation="9" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="pen-glow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="4" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>

            <!-- 左ページグラデ（中央に向かって暗くなる） -->
            <linearGradient id="lpage-grad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#1c0e48"/>
              <stop offset="75%" stop-color="#180c42"/>
              <stop offset="100%" stop-color="#0e0628"/>
            </linearGradient>
            <!-- 右ページグラデ（中央から明るくなる） -->
            <linearGradient id="rpage-grad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#0e0628"/>
              <stop offset="25%" stop-color="#180c42"/>
              <stop offset="100%" stop-color="#1c0e48"/>
            </linearGradient>
            <!-- カバーグラデ（左） -->
            <linearGradient id="lcover-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#2e0c72"/>
              <stop offset="100%" stop-color="#14043c"/>
            </linearGradient>
            <!-- カバーグラデ（右） -->
            <linearGradient id="rcover-grad" x1="100%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#2e0c72"/>
              <stop offset="100%" stop-color="#14043c"/>
            </linearGradient>
            <!-- 綴じ部中央グラデ（V字の谷） -->
            <linearGradient id="spine-center" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="rgba(0,0,15,0.70)"/>
              <stop offset="50%" stop-color="rgba(0,0,8,0.90)"/>
              <stop offset="100%" stop-color="rgba(0,0,15,0.70)"/>
            </linearGradient>
            <!-- 左ページ折りシャドウ -->
            <linearGradient id="lshadow" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
              <stop offset="100%" stop-color="rgba(0,0,20,0.60)"/>
            </linearGradient>
            <!-- 右ページ折りシャドウ -->
            <linearGradient id="rshadow" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="rgba(0,0,20,0.60)"/>
              <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
            </linearGradient>
            <!-- ペン本体グラデ（横方向のハイライト） -->
            <linearGradient id="pen-body-grad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#18163a"/>
              <stop offset="28%" stop-color="#2a2650"/>
              <stop offset="55%" stop-color="#201e46"/>
              <stop offset="100%" stop-color="#12103a"/>
            </linearGradient>
            <!-- ペンキャップグラデ（パープル） -->
            <linearGradient id="pen-cap-grad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#4c18a8"/>
              <stop offset="30%" stop-color="#7c3aed"/>
              <stop offset="65%" stop-color="#6d28d9"/>
              <stop offset="100%" stop-color="#3e0e90"/>
            </linearGradient>
            <!-- ニブ（金色） -->
            <linearGradient id="nib-grad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#b8860b"/>
              <stop offset="35%" stop-color="#ffd700"/>
              <stop offset="65%" stop-color="#e8b800"/>
              <stop offset="100%" stop-color="#907010"/>
            </linearGradient>
          </defs>

          <!-- ===== ノート下の影 ===== -->
          <ellipse cx="178" cy="218" rx="152" ry="7" fill="rgba(50,0,100,0.32)"/>

          <!-- ===== 左カバー（少し大きく） ===== -->
          <rect x="18" y="18" width="142" height="190" rx="4" fill="url(#lcover-grad)" filter="url(#glow-book)"/>

          <!-- ===== 左ページ ===== -->
          <rect x="22" y="22" width="134" height="184" rx="1" fill="url(#lpage-grad)"/>

          <!-- 左ページ：罫線 -->
          <line x1="30" y1="46" x2="148" y2="46" stroke="rgba(110,65,200,0.13)" stroke-width="0.6"/>
          <line x1="30" y1="60" x2="148" y2="60" stroke="rgba(110,65,200,0.13)" stroke-width="0.6"/>
          <line x1="30" y1="74" x2="148" y2="74" stroke="rgba(110,65,200,0.13)" stroke-width="0.6"/>
          <line x1="30" y1="88" x2="148" y2="88" stroke="rgba(110,65,200,0.13)" stroke-width="0.6"/>
          <line x1="30" y1="102" x2="148" y2="102" stroke="rgba(110,65,200,0.13)" stroke-width="0.6"/>
          <line x1="30" y1="116" x2="148" y2="116" stroke="rgba(110,65,200,0.13)" stroke-width="0.6"/>
          <line x1="30" y1="130" x2="148" y2="130" stroke="rgba(110,65,200,0.13)" stroke-width="0.6"/>
          <line x1="30" y1="144" x2="148" y2="144" stroke="rgba(110,65,200,0.13)" stroke-width="0.6"/>
          <line x1="30" y1="158" x2="148" y2="158" stroke="rgba(110,65,200,0.13)" stroke-width="0.6"/>
          <line x1="30" y1="172" x2="148" y2="172" stroke="rgba(110,65,200,0.13)" stroke-width="0.6"/>
          <line x1="30" y1="186" x2="148" y2="186" stroke="rgba(110,65,200,0.13)" stroke-width="0.6"/>
          <!-- 縦マージン線 -->
          <line x1="44" y1="22" x2="44" y2="206" stroke="rgba(147,51,234,0.14)" stroke-width="0.5"/>

          <!-- 左ページ：書き込み（既に書かれている） -->
          <!-- タイトル行 -->
          <rect x="50" y="42" width="68" height="3" rx="1.5" fill="rgba(192,132,252,0.55)"/>
          <!-- 本文行 -->
          <rect x="50" y="57" width="90" height="2" rx="1" fill="rgba(150,100,230,0.30)"/>
          <rect x="50" y="71" width="80" height="2" rx="1" fill="rgba(150,100,230,0.26)"/>
          <rect x="50" y="85" width="88" height="2" rx="1" fill="rgba(150,100,230,0.26)"/>
          <rect x="50" y="99" width="74" height="2" rx="1" fill="rgba(150,100,230,0.24)"/>
          <rect x="50" y="113" width="84" height="2" rx="1" fill="rgba(150,100,230,0.22)"/>
          <rect x="50" y="127" width="70" height="2" rx="1" fill="rgba(150,100,230,0.20)"/>
          <rect x="50" y="141" width="82" height="2" rx="1" fill="rgba(150,100,230,0.18)"/>
          <rect x="50" y="155" width="60" height="2" rx="1" fill="rgba(150,100,230,0.16)"/>

          <!-- 左ページ折りシャドウ（右端） -->
          <rect x="138" y="22" width="18" height="184" fill="url(#lshadow)"/>

          <!-- ===== 綴じ部（中央の折り） ===== -->
          <rect x="156" y="16" width="44" height="196" fill="url(#spine-center)"/>
          <!-- 綴じのハイライトライン（V字の頂点） -->
          <line x1="178" y1="18" x2="178" y2="212" stroke="rgba(120,50,230,0.22)" stroke-width="0.8"/>
          <!-- 上下の装飾ライン -->
          <line x1="156" y1="20" x2="200" y2="20" stroke="rgba(147,51,234,0.22)" stroke-width="0.6"/>
          <line x1="156" y1="208" x2="200" y2="208" stroke="rgba(147,51,234,0.22)" stroke-width="0.6"/>

          <!-- ===== 右カバー ===== -->
          <rect x="200" y="18" width="142" height="190" rx="4" fill="url(#rcover-grad)"/>

          <!-- ===== 右ページ ===== -->
          <rect x="204" y="22" width="134" height="184" rx="1" fill="url(#rpage-grad)"/>

          <!-- 右ページ折りシャドウ（左端） -->
          <rect x="204" y="22" width="18" height="184" fill="url(#rshadow)"/>

          <!-- 右ページ：罫線 -->
          <line x1="212" y1="46" x2="330" y2="46" stroke="rgba(110,65,200,0.13)" stroke-width="0.6"/>
          <line x1="212" y1="60" x2="330" y2="60" stroke="rgba(110,65,200,0.13)" stroke-width="0.6"/>
          <line x1="212" y1="74" x2="330" y2="74" stroke="rgba(110,65,200,0.13)" stroke-width="0.6"/>
          <line x1="212" y1="88" x2="330" y2="88" stroke="rgba(110,65,200,0.13)" stroke-width="0.6"/>
          <line x1="212" y1="102" x2="330" y2="102" stroke="rgba(110,65,200,0.13)" stroke-width="0.6"/>
          <line x1="212" y1="116" x2="330" y2="116" stroke="rgba(110,65,200,0.13)" stroke-width="0.6"/>
          <line x1="212" y1="130" x2="330" y2="130" stroke="rgba(110,65,200,0.13)" stroke-width="0.6"/>
          <line x1="212" y1="144" x2="330" y2="144" stroke="rgba(110,65,200,0.13)" stroke-width="0.6"/>
          <line x1="212" y1="158" x2="330" y2="158" stroke="rgba(110,65,200,0.13)" stroke-width="0.6"/>
          <line x1="212" y1="172" x2="330" y2="172" stroke="rgba(110,65,200,0.13)" stroke-width="0.6"/>
          <line x1="212" y1="186" x2="330" y2="186" stroke="rgba(110,65,200,0.13)" stroke-width="0.6"/>
          <!-- 縦マージン線 -->
          <line x1="228" y1="22" x2="228" y2="206" stroke="rgba(147,51,234,0.14)" stroke-width="0.5"/>

          <!-- 右ページ：書き込み（書きかけ） -->
          <rect x="234" y="42" width="52" height="3" rx="1.5" fill="rgba(192,132,252,0.48)"/>
          <rect x="234" y="57" width="82" height="2" rx="1" fill="rgba(150,100,230,0.28)"/>
          <rect x="234" y="71" width="70" height="2" rx="1" fill="rgba(150,100,230,0.24)"/>
          <rect x="234" y="85" width="76" height="2" rx="1" fill="rgba(150,100,230,0.22)"/>
          <!-- 書きかけの行（発光） -->
          <rect x="234" y="99" width="44" height="2" rx="1" fill="rgba(240,171,252,0.65)"/>
          <!-- テキストカーソル -->
          <rect x="280" y="95" width="1.5" height="10" rx="0.75" fill="rgba(240,171,252,0.90)"/>

          <!-- ノート上部の光グロー -->
          <ellipse cx="178" cy="18" rx="88" ry="4" fill="rgba(120,40,220,0.18)"/>

          <!-- 左右カバー枠線 -->
          <rect x="18" y="18" width="142" height="190" rx="4" fill="none" stroke="rgba(120,50,220,0.40)" stroke-width="1"/>
          <rect x="200" y="18" width="142" height="190" rx="4" fill="none" stroke="rgba(120,50,220,0.40)" stroke-width="1"/>

          <!-- ===== 万年筆（ニブがノート右ページに向かって書く） ===== -->
          <!-- nib先端: 画面座標(260, 152)付近 / rotate(28)で右上に傾く -->
          <g transform="translate(260, 152) rotate(28)" filter="url(#pen-glow)">
            <!-- ニブ（0,0が先端、上に向かって本体） -->
            <path d="M-7,-12 L0,3 L7,-12 Z" fill="url(#nib-grad)"/>
            <!-- ニブ中央の割れ線 -->
            <line x1="0" y1="1" x2="0" y2="-10" stroke="rgba(70,40,0,0.55)" stroke-width="0.8"/>
            <!-- ニブの光沢（左ハーフ） -->
            <path d="M-7,-12 L0,0 L-7,0 Z" fill="rgba(255,235,100,0.18)"/>

            <!-- グリップ部 -->
            <rect x="-7.5" y="-38" width="15" height="26" rx="2" fill="#0c0620"/>
            <!-- グリップ溝テクスチャ -->
            <line x1="-7" y1="-20" x2="7" y2="-20" stroke="rgba(147,51,234,0.22)" stroke-width="0.5"/>
            <line x1="-7" y1="-24" x2="7" y2="-24" stroke="rgba(147,51,234,0.22)" stroke-width="0.5"/>
            <line x1="-7" y1="-28" x2="7" y2="-28" stroke="rgba(147,51,234,0.22)" stroke-width="0.5"/>
            <line x1="-7" y1="-32" x2="7" y2="-32" stroke="rgba(147,51,234,0.22)" stroke-width="0.5"/>
            <!-- グリップ上リング -->
            <rect x="-8.5" y="-40" width="17" height="3" rx="1.5" fill="rgba(192,132,252,0.48)"/>

            <!-- ペン本体 -->
            <rect x="-8.5" y="-118" width="17" height="78" rx="2" fill="url(#pen-body-grad)"/>
            <!-- 本体光沢ライン -->
            <rect x="-5.5" y="-117" width="5" height="75" rx="2.5" fill="rgba(255,255,255,0.06)"/>
            <!-- 本体下リング -->
            <rect x="-8.5" y="-46" width="17" height="2.5" rx="1" fill="rgba(147,51,234,0.35)"/>
            <!-- 本体上リング -->
            <rect x="-8.5" y="-116" width="17" height="2.5" rx="1" fill="rgba(147,51,234,0.28)"/>

            <!-- キャップ（パープル） -->
